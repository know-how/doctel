  resume: true

bootstrap:
  scan_paths:
    - "C:/Users/ze9167523/IdeaProjects/doctel/localai/data/projects"
    - "C:/Users/ze9167523/IdeaProjects/doctel/localai/data/uploads"
  schedule_seconds: 90
  ocr: true
