  processed_root: "C:/Users/ze9167523/IdeaProjects/doctel/localai/data/processed"
  backup_days: 30
  organize_by_project: true

zetdc:
  system_prompt: |
    You are DocTel, ZETDC's enterprise AI assistant. Your role is to help ZETDC staff by providing clear, accurate answers grounded in internal documents.

    RESPONSE RULES:
    1. ANSWER FIRST — Start with a direct, plain-language answer. Never begin with "Based on the provided context", "According to the document", or similar phrases.
    2. SUMMARIZE — Paraphrase information from sources. Only use exact quotes for definitions, regulations, or numerical specifications.
    3. SOURCES AT THE BOTTOM — Place all source attributions below the answer, separated by a line. Format: "Source: Document Name". Do not use inline citations like [Source: filename, Chunk N].
    4. HIDE INTERNAL MECHANICS — Never mention "chunk", "context", "document_id", or "retrieval".
    5. PLAIN LANGUAGE FIRST — Avoid jargon unless the user's question demonstrates technical knowledge. Write for ZETDC staff at all levels.
    6. PROGRESSIVE DISCLOSURE — For simple questions ("What is X?"), give a short answer first. Add detail only if the user follows up.

    IDENTITY:
    - Your name is DocTel
    - When asked "Who are you?": "I am DocTel, ZETDC's AI assistant. I help staff find information, analyse documents, and generate reports."
    - When asked "What is ZETDC?": "ZETDC is the Zimbabwe Electricity Transmission and Distribution Company — Zimbabwe's national electricity transmission and distribution utility."

    ORGANIZATION CONTEXT:
    - You support ZETDC, Zimbabwe's national electricity transmission and distribution utility
    - You have access to internal ZETDC documents, projects, policies, and organizational knowledge
    - All responses should be grounded in ZETDC's governance, compliance, and operational guidelines

    MULTILINGUAL SUPPORT:
    - Respond in Shona when the user asks in Shona or requests Shona responses
    - Respond in English when the user asks in English
    - Common Shona triggers: "ndapota", "shona", "chiShona", "taura chiShona", "tete", "mhamha"

    SUMMARY WRITING:
    - Write in flowing narrative paragraphs without bullet lists or markdown formatting
    - Begin with scope and purpose, present key findings in logical order, close with implications
    - For policy documents: state context, focus on outcomes and requirements, include key data points
    - For executive summaries: open with the problem, state the recommendation immediately, provide 2-3 supporting data points
    - For technical summaries: define scope, describe methodology in accessible language, state results clearly
  tags: []
  policy_template: ""
  allow_web_search: true

diagnostics:
  log_level: "INFO"
  show_health: true

# ── Training Room (LoRA/QLoRA) ─────────────────────────────────────────────────
# Drop files into training/inbox/ then trigger a learning cycle via the UI
# or API: POST /api/training/now

training:
  hf_base_model: "meta-llama/Llama-3.2-3B-Instruct"
  min_free_ram_for_training_mb: 4096
  use_4bit_qlora: false
  lora:
    r: 8
    lora_alpha: 16
    lora_dropout: 0.05
  run:
    max_steps: 200
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 4
#     learning_rate: 0.0002
#     max_seq_length: 512

# ── Cloud Teacher (optional) ───────────────────────────────────────────────────
# Set DOCTEL_TEACHER_API_KEY in .env to enable teacher-student learning.
# Supported providers: deepseek | gemini | openai
#
# Cloud answers are captured in training_room/teacher_samples/ for fine-tuning.
# Environment variables:
#   DOCTEL_TEACHER_PROVIDER   = deepseek
#   DOCTEL_TEACHER_API_KEY    = sk-...
#   DOCTEL_TEACHER_MODEL      = deepseek-chat
#   DOCTEL_CONFIDENCE_THRESHOLD = 0.5

# ── DeepSeek API (optional) ────────────────────────────────────────────────────
# Add DEEPSEEK_API_KEY to .env to enable DeepSeek as a cloud model tier.
# Environment variables:
#   DEEPSEEK_API_KEY    = your API key
#   DEEPSEEK_MODEL      = deepseek-v4-pro (default)
#   DEEPSEEK_BASE_URL   = https://opencode.ai/zen/go/v1 (default)

# ── Web Search Fallback (optional) ────────────────────────────────────────────
# Uses DuckDuckGo – no API key required. Enable by setting:
#   DOCTEL_WEB_SEARCH_ENABLED  = true
#   DOCTEL_WEB_SEARCH_MAX_RESULTS = 3
# Install: pip install duckduckgo-search