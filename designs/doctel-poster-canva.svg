<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="420mm" height="594mm" viewBox="0 0 420 594" version="1.1">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F7F9FB"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="logoGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#FF8C00"/>
      <stop offset="0.5" stop-color="#FFD100"/>
      <stop offset="1" stop-color="#FF3B3B"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="420" height="594" fill="url(#bgGrad)"/>
  <rect x="3" y="3" width="414" height="588" fill="none" stroke="#EEEEEE" stroke-dasharray="2 2"/>

  <!-- Header bar -->
  <rect x="18" y="18" width="384" height="68" rx="6" fill="#0B4F7F" filter="url(#softShadow)"/>

  <!-- Real ZETDC logo from repository (embedded by URL) -->
  <image x="30" y="29" width="56" height="56" xlink:href="https://raw.githubusercontent.com/know-how/doctel/main/logo/zetdc-logo.png" preserveAspectRatio="xMidYMid slice"/>

  <!-- Title and subtitle -->
  <text x="110" y="36" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#FFFFFF">Doctel</text>
  <text x="110" y="56" font-family="Montserrat, Arial, sans-serif" font-size="11" fill="#FFFFFF">ZETDC LLM System — AI for faster, safer, smarter operations</text>

  <!-- Hero block -->
  <g transform="translate(18,100)">
    <rect x="0" y="0" width="384" height="110" rx="6" fill="#FFFFFF" stroke="#E6EEF5"/>
    <text x="18" y="24" font-family="Montserrat, Arial, sans-serif" font-size="18" font-weight="700" fill="#0B4F7F">Turn manuals & field images into instant operational knowledge</text>
    <text x="18" y="46" font-family="Inter, Arial, sans-serif" font-size="11.2" fill="#22323A" xml:space="preserve">Doctel provides searchable manuals, image-driven diagnostics, and auto-generated reports — enabling faster diagnoses, automated reporting, and searchable institutional knowledge for ZETDC crews.</text>

    <!-- Illustrative image (vector) on the right -->
    <g transform="translate(260,8)">
      <rect x="0" y="0" width="100" height="80" rx="8" fill="#EFF7FB" stroke="#D7EEF9"/>
      <circle cx="24" cy="20" r="10" fill="#FFDDAA"/>
      <rect x="12" y="32" width="24" height="28" rx="4" fill="#2AA84F"/>
      <rect x="50" y="18" width="36" height="44" rx="4" fill="#222"/>
      <rect x="54" y="22" width="28" height="20" rx="2" fill="#FFFFFF"/>
      <text x="68" y="36" font-size="6.5" font-family="Inter, Arial" fill="#0B4F7F" text-anchor="middle">IMG</text>
      <rect x="58" y="46" width="20" height="12" rx="2" fill="#FFF6E0" stroke="#FFCC00"/>
      <text x="68" y="54" font-size="5" font-family="Inter, Arial" fill="#222" text-anchor="middle">Fault</text>
      <path d="M60 38 L56 34" stroke="#FF3B3B" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Three columns -->
  <g transform="translate(18,220)">
    <rect x="0" y="0" width="122" height="300" rx="6" fill="#FFFFFF" stroke="#E6EEF5"/>
    <text x="12" y="18" font-family="Montserrat, Arial, sans-serif" font-size="13" font-weight="700" fill="#0B4F7F">Top benefits</text>
    <g font-family="Inter, Arial" font-size="10" fill="#22323A">
      <text x="12" y="40">• Faster incident resolution — media-driven diagnostics</text>
      <text x="12" y="58">• Better knowledge retention — searchable manuals & images</text>
      <text x="12" y="76">• Field crew enablement — contextual guidance from images</text>
      <text x="12" y="94">• Reduced admin overhead — automated reports & templates</text>
      <text x="12" y="112">• Improved compliance & auditability — logged evidence</text>
      <text x="12" y="130">• Measurable cost savings — fewer repeat visits</text>
    </g>

    <rect x="136" y="0" width="122" height="300" rx="6" fill="#FFFFFF" stroke="#E6EEF5"/>
    <text x="148" y="18" font-family="Montserrat, Arial, sans-serif" font-size="13" font-weight="700" fill="#0B4F7F">Key features</text>
    <g font-family="Inter, Arial" font-size="10" fill="#22323A">
      <text x="148" y="40">• Intelligent document & media search</text>
      <text x="148" y="58">• Automatic incident summaries with annotated images</text>
      <text x="148" y="76">• Image analysis & OCR for field evidence</text>
      <text x="148" y="94">• Report & template generation with media</text>
      <text x="148" y="112">• Conversational field assistant (chat + image)</text>
      <text x="148" y="130">• Secure on-prem/private cloud & audit trails</text>
      <text x="148" y="148">• Integrations: docs, ticketing, monitoring</text>
    </g>

    <rect x="272" y="0" width="122" height="300" rx="6" fill="#FFFFFF" stroke="#E6EEF5"/>
    <text x="284" y="18" font-family="Montserrat, Arial, sans-serif" font-size="13" font-weight="700" fill="#0B4F7F">Use cases</text>
    <g font-family="Inter, Arial" font-size="10" fill="#22323A">
      <text x="284" y="40">• Fault diagnosis from pole/transformer photos</text>
      <text x="284" y="58">• Annotated evidence packages for audits</text>
      <text x="284" y="76">• Training with annotated images & guides</text>
      <text x="284" y="94">• Remote assistance via technician photos</text>
      <text x="284" y="112">• Automated maintenance summaries</text>
    </g>
  </g>

  <!-- Pilot impact -->
  <g transform="translate(18,532)">
    <rect x="0" y="-124" width="384" height="110" rx="6" fill="#FFFFFF" stroke="#E6EEF5"/>
    <text x="20" y="-100" font-family="Montserrat, Arial, sans-serif" font-size="13" font-weight="700" fill="#0B4F7F">Pilot impact — Knowledge Kwaramba</text>
    <text x="26" y="-70" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#222">−75%</text>
    <text x="70" y="-60" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22323A">Search time for manuals & media</text>
    <text x="170" y="-70" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#222">−45%</text>
    <text x="214" y="-60" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22323A">Incident-to-restoration</text>
    <text x="26" y="-30" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#222">−30%</text>
    <text x="70" y="-20" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22323A">New-hire ramp time</text>
    <text x="170" y="-30" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="700" fill="#222">−60%</text>
    <text x="214" y="-20" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22323A">Admin reporting time</text>
  </g>

  <!-- Footer -->
  <g transform="translate(18,560)">
    <text x="12" y="18" font-family="Inter, Arial, sans-serif" font-size="10" fill="#22323A">Pilot lead: Knowledge Kwaramba • kkwaramba@zetdc.co.zw</text>
    <rect x="334" y="-4" width="56" height="56" rx="6" fill="#FFFFFF" stroke="#E6EEF5" />
    <text x="362" y="20" font-family="Inter, Arial, sans-serif" font-size="8" fill="#0B4F7F" text-anchor="middle">QR</text>
    <text x="362" y="34" font-family="Inter, Arial, sans-serif" font-size="6" fill="#22323A" text-anchor="middle">github.com/know-how/doctel</text>
  </g>

  <text x="18" y="588" font-family="Inter, Arial, sans-serif" font-size="6" fill="#999">Designed for A2 print (420×594 mm). Export to PDF at 300 DPI, CMYK, 3 mm bleed. This SVG is Canva-friendly: import it into Canva as a design element, replace text and images as needed.</text>
</svg>
